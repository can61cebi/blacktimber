# BlackTimber configuration.
# Reload after editing with: /blacktimber reload

# Detection
# Only fell trunks that still carry natural (non player placed) leaves.
# Natural leaves have persistent=false, player placed leaves have persistent=true.
# This single rule is what keeps houses and wooden builds from being toppled.
require-natural-leaves: true
# Minimum number of natural leaves that must be attached to count as a tree.
min-natural-leaves: 1
# Detection only: how far around a log to look for natural leaves when deciding
# whether a trunk is a real tree. This does NOT limit how many leaves are cleared.
# Leaf clearing follows the vanilla decay rule (every leaf the felled tree no longer
# supports, within 6 blocks, is cleared) so the whole canopy goes, outer layers
# included, while a neighbouring tree's leaves are always left alone.
leaf-search-radius: 1
# Safety ceiling on how many leaves a single fell may examine while working out the
# canopy. Beyond this the plugin leaves cleanup to vanilla decay rather than risk a
# neighbour's leaves. Only huge, densely packed canopies ever reach it.
leaf-clear-budget: 8192
# Connect logs diagonally during the search.
# Required for acacia and cherry branches and for reliable 2x2 trunks.
search-diagonal: true
# Hard cap on logs removed in a single fell. Protects against grief and lag.
max-logs: 150

# Activation
# Only trigger while the player holds an axe.
require-axe: true
# Sneak rule: ignore, required, or forbidden.
sneak-requirement: ignore
# Skip creative and spectator mode.
survival-only: true
# Per player defaults (each player can override these in the menu).
# Whether tree felling is on for a player before they toggle it.
default-enabled: true
# Whether felling also breaks the tree's leaves. Off lets them decay like vanilla.
default-break-leaves: false
# Whether drops from felling go straight to the player inventory.
default-auto-pickup: false
# Whether felling replants a matching sapling at the base. Off by default. The
# species is read from the felled trunk: oak, birch, spruce, jungle, acacia and
# cherry replant one sapling; dark oak and pale oak replant their full 2x2 only
# when all four spots are clear; mangrove replants a propagule. It plants only on
# valid ground (dirt, grass, podzol, moss and the like, plus farmland; mangrove
# also clay and mud) and never over water, lava or an occupied block.
default-replant: false

# Tool handling
# Damage the axe once per log felled (Unbreaking still applies). A worn axe only
# fells as many logs as it can pay for and leaves the rest of the tree standing,
# so felling can never outrun durability.
apply-durability: true
# Honor the Unbreaking enchantment when applying durability.
respect-unbreaking: true
# Let the axe break like vanilla once it runs out of durability mid-fell. Set this
# to false to protect the axe instead: it then stops felling at 1 durability and
# leaves the rest of the tree standing rather than breaking.
break-tool: true

# Leaf loot
# When a player has leaf breaking on, broken leaves can drop bonus loot themed to
# the biome, tree species and tree size. Vanilla saplings, sticks and apples still
# drop on top of this.
leaf-loot-enabled: true
# Global multiplier on every bonus loot chance. Raise or lower the whole economy.
leaf-loot-multiplier: 1.0
# Hard ceiling on any single bonus loot chance per leaf, after the multipliers.
leaf-loot-max-chance: 0.25
# Admin added loot, edited from the in game loot editor. Each entry is a Base64
# item, a chance and a biome id ("*" means any biome).
leaf-loot-custom: []

# Build protection
# A tree is felled only when it is purely natural, never when a player has built on it.
# Remember logs a player places by hand and never fell a cluster that contains one.
# This protects tree houses and hand built trees.
protect-player-built: true
# Also protect a tree when crafted blocks (planks, stairs, slabs, fences, doors,
# trapdoors, walls, ladders, glass) are attached to its logs.
protect-structures: true
# How many attached crafted blocks mark a tree as a build.
structure-block-threshold: 1
# Upper bound on remembered player placed logs per chunk. Guards chunk data size.
max-tracked-per-chunk: 4096

# Performance
# Fells larger than this many logs are spread across ticks using the region scheduler.
stagger-threshold: 64
# Logs broken per tick while a large fell is being spread out.
logs-per-tick: 16

# Telemetry
# Anonymous usage stats. Once every 15 minutes the plugin sends a small ping to
# https://cebi.tr/api/blacktimber/telemetry with only this server's random id, its
# current online player count, and its software and version strings. No IP address,
# no player names and nothing personal is ever collected or stored. The totals power
# the live chart in the project README. Set this to false to opt out completely.
telemetry: true
# A random id generated on first run so distinct servers can be counted. It is not
# tied to your IP or hardware. Leave it blank and the plugin fills it in once.
telemetry-server-id: ''
