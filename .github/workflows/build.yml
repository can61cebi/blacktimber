name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --no-daemon --console=plain

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: BlackTimber
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=".github/releases/${GITHUB_REF_NAME}.md"
          args=(--title "BlackTimber ${version}")
          if [ -f "$notes" ]; then
            args+=(--notes-file "$notes")
          else
            args+=(--generate-notes)
          fi
          gh release create "${GITHUB_REF_NAME}" build/libs/*.jar "${args[@]}" \
            || gh release upload "${GITHUB_REF_NAME}" build/libs/*.jar --clobber
