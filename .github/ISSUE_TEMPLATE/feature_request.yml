name: Feature request
description: Suggest an idea or an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that BlackTimber does not allow today
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: How you imagine it working
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
